# ─────────────────────────────────────────────────────────────────────────────
# react-native-bitnet — Release
#
# Triggered when you push a version tag  (e.g. git tag v0.2.0 && git push --tags)
# Runs the full CI suite, then publishes to npm.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: "Publish to npm"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: react-native-bitnet/package-lock.json

      - name: Install dependencies
        working-directory: react-native-bitnet
        run: npm ci

      - name: Run full test suite
        working-directory: react-native-bitnet
        run: npm run test:all
        env:
          CI: true

      - name: TypeScript type check
        working-directory: react-native-bitnet
        run: npm run typecheck

      - name: Build library (CommonJS + ESM + types)
        working-directory: react-native-bitnet
        run: npm run prepare

      - name: Publish to npm
        working-directory: react-native-bitnet
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
