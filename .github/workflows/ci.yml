# ─────────────────────────────────────────────────────────────────────────────
# react-native-bitnet — Continuous Integration
#
# Runs on every push and pull-request to main / develop.
#
# Jobs
# ────
# 1. js-checks     — lint, typecheck, unit tests, integration tests  (Ubuntu, fast)
# 2. android-build — NDK + CMake native build                        (Ubuntu, ~8 min)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Job 1: JS checks ────────────────────────────────────────────────────────
jobs:
  js-checks:
    name: "JS — lint / typecheck / test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-native-bitnet/package-lock.json

      - name: Install dependencies
        working-directory: react-native-bitnet
        run: npm ci

      - name: Lint
        working-directory: react-native-bitnet
        run: npm run lint
        continue-on-error: true   # warn but don't fail CI on lint

      - name: TypeScript type check
        working-directory: react-native-bitnet
        run: npm run typecheck

      - name: Unit tests
        working-directory: react-native-bitnet
        run: npm test
        env:
          CI: true

      - name: Integration tests (Stage 1 + Stage 2 checklist)
        working-directory: react-native-bitnet
        run: npm run test:integration
        env:
          CI: true
          # LIVE_HF is intentionally NOT set — no real network calls in CI

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: react-native-bitnet/coverage/
          if-no-files-found: ignore

# ─── Job 2: Android native build ─────────────────────────────────────────────
  android-build:
    name: "Android — NDK + CMake build"
    runs-on: ubuntu-latest
    needs: js-checks    # only build native if JS checks pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r26 and CMake
        run: |
          sdkmanager --install \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-native-bitnet/package-lock.json

      - name: Install JS dependencies
        working-directory: react-native-bitnet
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('react-native-bitnet/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Cache CMake / FetchContent
        uses: actions/cache@v4
        with:
          path: react-native-bitnet/android/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('react-native-bitnet/android/CMakeLists.txt') }}
          restore-keys: cxx-${{ runner.os }}-

      - name: Build Android (assembleDebug — arm64-v8a only)
        working-directory: react-native-bitnet/android
        run: |
          # Create a minimal local.properties so Gradle finds the SDK
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          # Build only arm64-v8a to keep CI fast; armeabi-v7a is tested locally
          ./gradlew assembleDebug \
            -Pandroid.injected.build.abi=arm64-v8a \
            --no-daemon \
            --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-aar
          path: react-native-bitnet/android/build/outputs/aar/*.aar
          if-no-files-found: ignore
