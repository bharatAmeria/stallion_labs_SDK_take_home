apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // Root of the React Native project (where package.json lives)
    root = file("../../")
    // Entry file for Metro bundler
    entryFile = file("../../index.js")
}

android {
    // Inline constants — avoids "not specified" errors if root ext isn't ready
    ndkVersion "27.1.12297006"
    buildToolsVersion "35.0.0"
    compileSdk 35

    namespace "com.bitnetexample"

    defaultConfig {
        applicationId "com.bitnetexample"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = "17" }
}

dependencies {
    // React Native runtime — published as Maven artifacts in RN 0.74+
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    // BitNet SDK native module
    implementation project(':react-native-bitnet')
}
